<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#1a1a1a"/>
  
  <!-- Outer border -->
  <rect x="20" y="20" width="472" height="472" fill="none" stroke="#ff6b00" stroke-width="4" rx="40"/>
  
  <!-- Welding spark effect (top right corner) -->
  <circle cx="420" cy="92" r="3" fill="#ffd700"/>
  <circle cx="432" cy="85" r="2" fill="#ffd700"/>
  <circle cx="410" cy="78" r="2" fill="#ffeb3b"/>
  <circle cx="428" cy="105" r="2.5" fill="#ffd700"/>
  
  <!-- Main logo - Stylized "DE" (Dayal Engineering) -->
  <g id="logo-mark">
    <!-- D -->
    <path d="M 140 160 L 140 352 L 220 352 C 280 352 310 322 310 256 C 310 190 280 160 220 160 Z M 175 195 L 220 195 C 255 195 275 215 275 256 C 275 297 255 317 220 317 L 175 317 Z" fill="#ff6b00"/>
    
    <!-- E -->
    <path d="M 330 160 L 330 352 L 450 352 L 450 317 L 365 317 L 365 272 L 440 272 L 440 237 L 365 237 L 365 195 L 450 195 L 450 160 Z" fill="#ff6b00"/>
  </g>
  
  <!-- Bottom text -->
  <text x="256" y="405" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ff6b00" text-anchor="middle">DAYAL</text>
  <text x="256" y="440" font-family="Arial, sans-serif" font-size="20" fill="#ff6b00" text-anchor="middle">ENGINEERING</text>
  
  <!-- Welding decoration line -->
  <line x1="120" y1="420" x2="392" y2="420" stroke="#ff6b00" stroke-width="2" opacity="0.5"/>
  
  <!-- Small welding icon -->
  <g transform="translate(80, 380)">
    <path d="M 0 0 L 15 25 L 8 25 L 8 35 L -8 35 L -8 25 L -15 25 Z" fill="#ff6b00" opacity="0.7"/>
    <circle cx="0" cy="-5" r="2" fill="#ffd700"/>
  </g>
</svg>
